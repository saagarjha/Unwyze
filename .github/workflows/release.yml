name: Release

on:
  push:
    paths:
      - Unwyze/Deployment.xcconfig

jobs:
  upload:
    runs-on: macos-26
    environment: Release
    env:
      GH_TOKEN: ${{ github.token }}
      XCODEBUILD_EXTRA_ARGS: >
        -allowProvisioningUpdates
        -authenticationKeyPath /tmp/AuthKey.p8
        -authenticationKeyID ${{ secrets.AUTHENTICATION_KEY_ID }}
        -authenticationKeyIssuerID ${{ secrets.AUTHENTICATION_KEY_ISSUER_ID }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sanity check
        run: |
          set -x

          version="$(cat Unwyze/Deployment.xcconfig | grep CURRENT_PROJECT_VERSION | awk '{ print $3 }')"
          marketing_version="$(cat Unwyze/Deployment.xcconfig | grep MARKETING_VERSION | awk '{ print $3 }')"

          # Grab all the tags
          git fetch --tags
          # Make sure this version doesn't exist already
          ! git tag --list | grep -q "v$version"

          # Check that the commit message matches the version
          git log -1 --pretty=%B | grep "\($version\)"
          git log -1 --pretty=%B | grep "\($marketing_version\)"

      - name: Create App Store Connect Key file
        run: echo "${{ secrets.APP_STORE_CONNECT_KEY }}" | base64 -d > /tmp/AuthKey.p8

      - name: Set up signing
        run: |
          KEYCHAIN="$RUNNER_TEMP/keychain.keychain-db"
          KEYCHAIN_PASSWORD=password

          echo "${{ secrets.CERTIFICATE }}" | base64 -d > "$RUNNER_TEMP/Certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          security import "$RUNNER_TEMP/Certificate.p12" -P "${{ secrets.CERTIFICATE_PASSWORD }}" -A -k "$KEYCHAIN"

          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          cp iOS.mobileprovision ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: System Info
        run: |
          uname -a
          xcodebuild -version

      - name: Archive
        run: xcodebuild -scheme Unwyze -archivePath Unwyze.xcarchive archive

      - name: Collect Assets
        run: |
          (
            cd Unwyze.xcarchive/Products/Applications/
            zip -r Unwyze.zip Unwyze.app
            mv Unwyze.zip ../../..
          )

          (
            cd Unwyze.xcarchive/dSYMs/
            zip -r Unwyze-symbols.zip Unwyze.app.dSYM/
            mv Unwyze-symbols.zip ../..
          )

      - name: Create Release
        run: |
          version="$(cat Unwyze/Deployment.xcconfig | grep CURRENT_PROJECT_VERSION | awk '{ print $3 }')"

          gh release create "v$version" -t "Build $version" -p Unwyze.zip Unwyze-symbols.zip

      - name: Upload
        run: xcodebuild $XCODEBUILD_EXTRA_ARGS -exportArchive -exportOptionsPlist ExportOptions.plist -archivePath Unwyze.xcarchive/ -exportPath Unwyze

      - name: Send to TestFlight
        env:
          AUTHENTICATION_KEY: /tmp/AuthKey.p8
          AUTHENTICATION_KEY_ID: ${{ secrets.AUTHENTICATION_KEY_ID }}
          AUTHENTICATION_KEY_ISSUER_ID: ${{ secrets.AUTHENTICATION_KEY_ISSUER_ID }}
        run: |
          version="$(cat Unwyze/Deployment.xcconfig | grep CURRENT_PROJECT_VERSION | awk '{ print $3 }')"

          # Make sure we all have all the latest tags (for notes)
          git fetch --tags

          ./send_to_testflight.swift "$version"
