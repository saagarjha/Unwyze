name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: System Info
        run: |
          uname -a
          xcodebuild -version

      - name: Build
        run: xcodebuild -project Unwyze.xcodeproj -scheme Unwyze -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO
